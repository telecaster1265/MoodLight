<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>배라 무드등 컨트롤러</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding-top: 50px; background: #222; color: #fff; }
        input[type="color"] { width: 200px; height: 200px; border: none; cursor: pointer; border-radius: 50%; }
        button { padding: 15px 30px; font-size: 16px; margin: 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>배라 무드등 색상 선택</h2>
    <button id="connectBtn">1. 무드등 연결하기</button>
    <br><br>
    <label>2. 스포이드로 색상 선택:</label><br><br>
    <input type="color" id="colorPicker" value="#ffffff" disabled>

    <script>
        let characteristic = null;

        // 1. 연결 버튼 클릭 시
        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'BR LAMP' }],
                    optionalServices: [0xFFB0]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(0xFFB0);
                characteristic = await service.getCharacteristic(0xFFB2);
                
                alert('연결 성공! 이제 색상을 고르세요.');
                document.getElementById('colorPicker').disabled = false;
            } catch (error) {
                console.error(error);
                alert('연결 실패: ' + error);
            }
        });

        // 2. 컬러피커로 색상 바꿀 때마다 실시간 패킷 전송
        document.getElementById('colorPicker').addEventListener('input', async (event) => {
            if (!characteristic) return;

            // #RRGGBB 형태의 Hex 스트링 가져오기 (예: #FF00AA)
            const hex = event.target.value; 
            
            // Hex 스트링을 각각 정수(Byte)로 변환
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);

            // 아까 찾아낸 [B][G][R] 순서로 패킷 배열 생성
            const packet = new Uint8Array([b, g, r]);

            try {
                // 무드등에 강제 주입
                await characteristic.writeValue(packet);
            } catch (error) {
                console.error('패킷 전송 실패:', error);
            }
        });
    </script>
</body>
</html>
