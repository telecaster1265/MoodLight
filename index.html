<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>배라 무드등 컨트롤러</title>
    <style>
      body {
        text-align: center;
        font-family: sans-serif;
        padding: 30px 15px;
        background: #222;
        color: #fff;
      }
      .card {
        background: #333;
        padding: 20px;
        border-radius: 15px;
        max-width: 400px;
        margin: 0 auto 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      }
      input[type="color"] {
        width: 150px;
        height: 150px;
        border: none;
        cursor: pointer;
        border-radius: 50%;
        background: none;
      }
      button {
        padding: 12px 24px;
        font-size: 16px;
        margin: 10px;
        cursor: pointer;
        border-radius: 8px;
        border: none;
        font-weight: bold;
      }
      #connectBtn {
        background: #007bff;
        color: white;
        width: 100%;
        max-width: 200px;
      }
      #saveBtn {
        background: #28a745;
        color: white;
      }
      #saveBtn:disabled {
        background: #555;
        color: #888;
        cursor: not-allowed;
      }
      .preset-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: 15px;
      }
      .preset-item {
        position: relative;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 2px solid #fff;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        transition: transform 0.1s;
      }
      .preset-item:active {
        transform: scale(0.9);
      }
      .delete-btn {
        position: absolute;
        top: -5px;
        right: -5px;
        background: red;
        color: white;
        border-radius: 50%;
        width: 18px;
        height: 18px;
        font-size: 11px;
        line-height: 16px;
        text-align: center;
        font-weight: bold;
        cursor: pointer;
        border: 1px solid white;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>배라 무드등 제어</h2>
      <button id="connectBtn">1. 무드등 연결</button>
    </div>

    <div class="card">
      <label style="display: block; margin-bottom: 10px; font-weight: bold"
        >2. 스포이드 색상 선택</label
      >
      <input type="color" id="colorPicker" value="#ffffff" disabled />
      <br />
      <button id="saveBtn" disabled>⭐️ 현재 색상 저장</button>
    </div>

    <div class="card">
      <label style="font-weight: bold">📌 저장된 색상 리스트</label>
      <div id="presetContainer" class="preset-container"></div>
    </div>

    <script>
      let characteristic = null;
      let savedColors = JSON.parse(localStorage.getItem("myMoodColors")) || [];

      const connectBtn = document.getElementById("connectBtn");
      const colorPicker = document.getElementById("colorPicker");
      const saveBtn = document.getElementById("saveBtn");
      const presetContainer = document.getElementById("presetContainer");

      // 페이지 로드 시 기존 저장된 색상 불러오기
      renderPresets();

      // 1. BLE 블루투스 연결
      connectBtn.addEventListener("click", async () => {
        try {
          const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: "BR LAMP" }],
            optionalServices: [0xffb0],
          });
          const server = await device.gatt.connect();
          const service = await server.getPrimaryService(0xffb0);
          characteristic = await service.getCharacteristic(0xffb2);

          connectBtn.innerText = "🟢 연결됨";
          connectBtn.style.background = "#28a745";
          colorPicker.disabled = false;
          saveBtn.disabled = false;
        } catch (error) {
          console.error(error);
          // 유저가 취소 버튼을 누른 경우(NotFoundError)가 아닐 때만 경고창 띄우기
          if (error.name !== "NotFoundError") {
            alert("연결 실패: " + error);
          }
        }
      });

      // 2. 무드등에 [B, G, R] 패킷 쏘는 함수
      async function sendColor(hex) {
        if (!characteristic) return;
        const r = parseInt(hex.substring(1, 3), 16);
        const g = parseInt(hex.substring(3, 5), 16);
        const b = parseInt(hex.substring(5, 7), 16);
        const packet = new Uint8Array([b, g, r]);
        try {
          await characteristic.writeValue(packet);
        } catch (e) {
          console.error("전송 에러:", e);
        }
      }

      // 3. 스포이드 조작 시 실시간 반영
      colorPicker.addEventListener("input", (e) => {
        sendColor(e.target.value);
      });

      // 4. [현재 색상 저장] 버튼 클릭 시 로직
      saveBtn.addEventListener("click", () => {
        const currentColor = colorPicker.value; // 현재 #RRGGBB 값
        if (!savedColors.includes(currentColor)) {
          savedColors.push(currentColor);
          localStorage.setItem("myMoodColors", JSON.stringify(savedColors)); // 브라우저 DB 저장
          renderPresets();
        }
      });

      // 5. 저장된 프리셋 UI 그리기
      function renderPresets() {
        presetContainer.innerHTML = "";
        savedColors.forEach((hex, index) => {
          const item = document.createElement("div");
          item.className = "preset-item";
          item.style.backgroundColor = hex;

          // 프리셋 클릭 시 무드등 색 변경 + 스포이드 위치 동기화
          item.addEventListener("click", () => {
            colorPicker.value = hex;
            sendColor(hex);
          });

          // X 버튼 누르면 삭제
          const delBtn = document.createElement("div");
          delBtn.className = "delete-btn";
          delBtn.innerText = "X";
          delBtn.addEventListener("click", (e) => {
            e.stopPropagation(); // 프리셋 클릭 이벤트 전파 방지
            savedColors.splice(index, 1);
            localStorage.setItem("myMoodColors", JSON.stringify(savedColors));
            renderPresets();
          });

          item.appendChild(delBtn);
          presetContainer.appendChild(item);
        });
      }
    </script>
  </body>
</html>
